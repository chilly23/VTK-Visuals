<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>3D Data Dashboard | vtk.js</title>
    <script src="https://unpkg.com/vtk.js@28.16.0/dist/vtk.js"></script>
    <style>
        body { margin: 0; font-family: sans-serif; background: #111; color: white; overflow: hidden; }
        #ui { position: absolute; top: 20px; left: 20px; z-index: 100; background: rgba(0,0,0,0.85); padding: 20px; border-radius: 12px; width: 260px; border: 1px solid #333; box-shadow: 0 10px 30px rgba(0,0,0,0.5); }
        #container { width: 100vw; height: 100vh; }
        .control-group { margin-bottom: 15px; }
        label { display: block; font-size: 11px; text-transform: uppercase; color: #888; margin-bottom: 8px; letter-spacing: 1px; }
        input[type="file"], select, input[type="range"] { width: 100%; background: #222; color: white; border: 1px solid #444; padding: 8px; border-radius: 4px; box-sizing: border-box; }
        button { width: 100%; padding: 10px; border-radius: 4px; border: none; background: #0070f3; color: white; font-weight: bold; cursor: pointer; margin-top: 10px; }
        button:hover { background: #0060df; }
        h2 { margin: 0 0 15px 0; font-size: 18px; color: #0070f3; border-bottom: 1px solid #333; padding-bottom: 10px; }
    </style>
</head>
<body>

<div id="ui">
    <h2>3D Data Portal</h2>
    
    <div class="control-group">
        <label>Step 1: Upload .vtp / .vtk</label>
        <input type="file" id="fileInput" />
    </div>

    <div class="control-group">
        <label>Step 2: Coloring</label>
        <select id="colorMap">
            <option value="erdc_rainbow_dark">Rainbow</option>
            <option value="Cool to Warm">Cool to Warm</option>
            <option value="Viridis (matplotlib)">Viridis</option>
        </select>
    </div>

    <div class="control-group">
        <label>Step 3: Remote Clip (Z-Plane)</label>
        <input type="range" id="clipRange" min="0" max="100" value="100">
    </div>

    <button id="resetCam">Reset View</button>
</div>

<div id="container"></div>

<script>
    // Access vtk globally from the CDN script
    const vtkRenderWindow = vtk.Rendering.Core.vtkRenderWindow;
    const vtkRenderer = vtk.Rendering.Core.vtkRenderer;
    const vtkOpenGLRenderWindow = vtk.Rendering.OpenGL.vtkRenderWindow;
    const vtkRenderWindowInteractor = vtk.Rendering.Core.vtkRenderWindowInteractor;
    const vtkInteractorStyleTrackballCamera = vtk.Interaction.Style.vtkInteractorStyleTrackballCamera;
    const vtkActor = vtk.Rendering.Core.vtkActor;
    const vtkMapper = vtk.Rendering.Core.vtkMapper;
    const vtkXMLPolyDataReader = vtk.IO.XML.vtkXMLPolyDataReader;
    const vtkClipPolyData = vtk.Filters.General.vtkClipPolyData;
    const vtkPlane = vtk.Common.DataModel.vtkPlane;

    // --- Setup Rendering Pipeline ---
    const container = document.querySelector('#container');
    const renderWindow = vtkRenderWindow.newInstance();
    const renderer = vtkRenderer.newInstance({ background: [0.1, 0.1, 0.1] });
    renderWindow.addRenderer(renderer);

    const openglRenderWindow = vtkOpenGLRenderWindow.newInstance();
    renderWindow.addView(openglRenderWindow);
    openglRenderWindow.setContainer(container);

    const interactor = vtkRenderWindowInteractor.newInstance();
    interactor.setView(openglRenderWindow);
    interactor.initialize();
    interactor.bindEvents(container);
    interactor.setInteractorStyle(vtkInteractorStyleTrackballCamera.newInstance());

    // Setup Global Pipeline Objects
    const reader = vtkXMLPolyDataReader.newInstance();
    const mapper = vtkMapper.newInstance();
    const actor = vtkActor.newInstance();
    const clipper = vtkClipPolyData.newInstance();
    const clipPlane = vtkPlane.newInstance();

    // Logic: Reader -> Clipper -> Mapper -> Actor
    clipper.setClipFunction(clipPlane);
    clipper.setInputConnection(reader.getOutputPort());
    mapper.setInputConnection(clipper.getOutputPort());
    actor.setMapper(mapper);

    // --- Handle File Upload ---
    document.getElementById('fileInput').addEventListener('change', (e) => {
        const file = e.target.files[0];
        if (!file) return;

        const fileReader = new FileReader();
        fileReader.onload = function() {
            // FIX: Ensure we use the correct method for vtk.js global
            reader.parseAsArrayBuffer(fileReader.result);
            
            const polyData = reader.getOutputData();
            const bounds = polyData.getBounds();
            
            // Set default clip plane to top of object
            clipPlane.setOrigin(0, 0, bounds[5]);
            clipPlane.setNormal(0, 0, 1);

            renderer.addActor(actor);
            renderer.resetCamera();
            renderWindow.render();
        };
        fileReader.readAsArrayBuffer(file);
    });

    // --- Handle Clipping ---
    document.getElementById('clipRange').addEventListener('input', (e) => {
        if (!reader.getOutputData()) return;
        
        const bounds = reader.getOutputData().getBounds();
        const zMin = bounds[4];
        const zMax = bounds[5];
        const zPos = zMin + (zMax - zMin) * (e.target.value / 100);
        
        clipPlane.setOrigin(0, 0, zPos);
        renderWindow.render();
    });

    // --- Window Resize & UI ---
    window.addEventListener('resize', () => {
        const dims = container.getBoundingClientRect();
        openglRenderWindow.setSize(dims.width, dims.height);
        renderWindow.render();
    });

    document.getElementById('resetCam').onclick = () => {
        renderer.resetCamera();
        renderWindow.render();
    };

    // Initial Trigger for Resize
    window.dispatchEvent(new Event('resize'));
</script>
</body>
</html>
